server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mutabor-sec.ru *.mutabor-sec.ru;

    ssl_certificate /etc/letsencrypt/live/mutabor-sec.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mutabor-sec.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:StubTLS:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /home/hosty/StubSite443_VPN;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
