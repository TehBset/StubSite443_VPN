<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glow Blocks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel">
        <header class="topbar">
          <div class="stat">
            <span class="stat__label">Best</span>
            <span class="stat__value" id="bestScore">0</span>
          </div>
          <div class="title-lockup">
            <p class="game-logo" aria-label="Glow Blocks">
              <span>Glow</span>
              <span>Blocks</span>
            </p>
          </div>
          <button class="restart-button" id="restartButton" type="button">
            Новая игра
          </button>
        </header>

        <section class="hud">
          <div class="score-card score-card--main">
            <span class="score-card__label">Score</span>
            <span class="score-card__value" id="scoreValue">0</span>
          </div>
          <div class="message-card" id="messageBox">
            Выбери фигуру снизу и поставь ее на поле.
          </div>
        </section>

        <section class="board-wrap">
          <div class="board" id="board" aria-label="Игровое поле"></div>
        </section>

        <section class="tray-section">
          <div class="tray-header">
            <h2>Фигуры</h2>
            <p>Заполни весь ряд или колонку, чтобы очистить их.</p>
          </div>
          <div class="tray" id="tray"></div>
        </section>

        <section class="meta-strip">
          <div class="live-card">
            <div class="live-card__header">
              <h2>Live Leaderboard</h2>
              <span class="live-chip" id="onlineCount">1,284 online</span>
            </div>
            <div class="leaderboard" id="leaderboard"></div>
          </div>
        </section>
      </section>
    </main>
    <div class="drag-ghost hidden" id="dragGhost" aria-hidden="true"></div>

    <script src="script.js"></script>
  </body>
</html>
